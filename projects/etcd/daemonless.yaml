build:
  variants:
    - tag: %%BASE1%%-2
      containerfile: Containerfile
      args:
        FREEBSD_RELEASE: "%%BASE1%%"
        NO_PKGCLEAN: "1"
      cache_dirs: ["%%PKGCACHE0%%"]
    - tag: %%BASE1%%-%%ETCDVER1%%
      containerfile: Containerfile
      args:
        FREEBSD_RELEASE: "%%BASE1%%"
        ETCDVER: "%%ETCDVER1%%"
        NO_PKGCLEAN: "1"
      cache_dirs: ["%%PKGCACHE0%%"]
    - tag: %%BASE1%%-%%ETCDVER2%%
      containerfile: Containerfile
      args:
        FREEBSD_RELEASE: "%%BASE1%%"
        ETCDVER: "%%ETCDVER2%%"
        NO_PKGCLEAN: "1"
      cache_dirs: ["%%PKGCACHE0%%"]
    - tag: %%BASE1%%-%%ETCDVER3%%
      containerfile: Containerfile
      aliases: ["latest"]
      default: true
      args:
        FREEBSD_RELEASE: "%%BASE1%%"
        ETCDVER: "%%ETCDVER3%%"
        NO_PKGCLEAN: "1"
      cache_dirs: ["%%PKGCACHE0%%"]
