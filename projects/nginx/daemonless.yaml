build:
  variants:
    - tag: %%BASE1%%
      containerfile: Containerfile
      aliases: ["latest"]
      default: true
      args:
        FREEBSD_RELEASE: "%%BASE1%%"
        NO_PKGCLEAN: "1"
      cache_dirs: ["%%PKGCACHE0%%"]
    - tag: %%BASE1%%-devel
      containerfile: Containerfile
      args:
        FREEBSD_RELEASE: "%%BASE1%%"
        FLAVOUR: '-devel'
        NO_PKGCLEAN: "1"
      cache_dirs: ["%%PKGCACHE0%%"]
    - tag: %%BASE1%%-full
      containerfile: Containerfile
      args:
        FREEBSD_RELEASE: "%%BASE1%%"
        FLAVOUR: '-full'
        NO_PKGCLEAN: "1"
      cache_dirs: ["%%PKGCACHE0%%"]
