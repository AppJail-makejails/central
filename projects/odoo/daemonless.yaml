build:
  variants:
    - tag: %%BASE1%%
      containerfile: Containerfile
      aliases: ["latest"]
      default: true
      args:
        FREEBSD_RELEASE: "%%BASE1%%"
        PYVER: "%%PYVER%%"
        NO_PKGCLEAN: "1"
      cache_dirs: ["%%PKGCACHE0%%"]
    - tag: %%BASE1%%-%%ODOOVER1%%
      containerfile: Containerfile
      args:
        FREEBSD_RELEASE: "%%BASE1%%"
        ODOOVER: "%%ODOOVER1%%"
        PYVER: "%%PYVER%%"
        NO_PKGCLEAN: "1"
      cache_dirs: ["%%PKGCACHE0%%"]
    - tag: %%BASE1%%-%%ODOOVER2%%
      containerfile: Containerfile
      args:
        FREEBSD_RELEASE: "%%BASE1%%"
        ODOOVER: "%%ODOOVER2%%"
        PYVER: "%%PYVER%%"
        NO_PKGCLEAN: "1"
      cache_dirs: ["%%PKGCACHE0%%"]
    - tag: %%BASE1%%-%%ODOOVER3%%
      containerfile: Containerfile
      args:
        FREEBSD_RELEASE: "%%BASE1%%"
        ODOOVER: "%%ODOOVER3%%"
        PYVER: "%%PYVER%%"
        NO_PKGCLEAN: "1"
      cache_dirs: ["%%PKGCACHE0%%"]
