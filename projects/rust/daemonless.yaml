build:
  variants:
    - tag: %%BASE1%%
      containerfile: Containerfile
      aliases: ["latest"]
      default: true
      args:
        FREEBSD_RELEASE: "%%BASE1%%"
    - tag: %%BASE1%%-nightly
      containerfile: Containerfile
      args:
        FREEBSD_RELEASE: "%%BASE1%%"
        NIGHTLY: 'yes'
